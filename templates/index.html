<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم بالمنصة - Vercel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap');
        body { font-family: 'Tajawal', sans-serif; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen">

    <nav class="border-b border-slate-800 bg-slate-950/80 p-4 sticky top-0 z-50 backdrop-blur">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center font-bold text-xl shadow-lg shadow-indigo-500/30">
                    <i class="fa-solid fa-sliders"></i>
                </div>
                <span class="text-xl font-extrabold bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent">
                    WebToApp Vercel Panel
                </span>
            </div>
            <span class="text-xs bg-emerald-500/10 text-emerald-400 px-3 py-1 rounded-full border border-emerald-500/20 font-semibold">
                🟢 السيرفر أونلاين (Vercel)
            </span>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto p-4 md:p-8 grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <div class="lg:col-span-7 bg-slate-800/80 border border-slate-700/60 rounded-2xl p-6 shadow-xl backdrop-blur">
            <h2 class="text-xl font-bold mb-6 text-indigo-400 flex items-center gap-2">
                <i class="fa-solid fa-mobile-screen-button"></i> إعداد التطبيق أونلاين
            </h2>

            <form id="createAppForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1 text-slate-300">اسم التطبيق</label>
                    <input type="text" id="appName" required placeholder="مثال: متجري أونلاين" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:border-indigo-500">
                </div>

                <div>
                    <label class="block text-sm font-medium mb-1 text-slate-300">رابط الموقع (Target URL)</label>
                    <input type="url" id="targetUrl" required placeholder="https://example.com" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:border-indigo-500 text-left" dir="ltr">
                </div>

                <div class="border-t border-slate-700/60 pt-4 mt-4">
                    <label class="block text-sm font-bold mb-2 text-indigo-300">🔒 نظام حماية ودخول التطبيق:</label>
                    
                    <select id="authType" onchange="toggleAuthFields()" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:border-indigo-500 mb-3">
                        <option value="none">1. بدون رمز (مفتوح للجميع)</option>
                        <option value="password">2. برمز مرور عام (Access Code)</option>
                        <option value="admin_approval">3. بموافقة الآدمن أونلاين (Admin Approval)</option>
                    </select>

                    <div id="passwordField" class="hidden">
                        <label class="block text-xs font-medium mb-1 text-slate-400">رمز المرور المطلوب لدخول التطبيق:</label>
                        <input type="text" id="accessPassword" placeholder="اكتب الرمز هنا..." class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-2 text-white text-sm">
                    </div>
                </div>

                <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 font-bold py-3 rounded-xl transition duration-200 mt-4 shadow-lg shadow-indigo-600/30">
                    حفظ وتحديث الإعدادات أونلاين 🚀
                </button>
            </form>

            <div id="statusBox" class="mt-4 p-3 rounded-xl hidden text-center text-sm font-bold"></div>
        </div>

        <div class="lg:col-span-5 space-y-6">
            <div class="bg-slate-800/80 border border-slate-700/60 rounded-2xl p-6 shadow-xl backdrop-blur">
                <h3 class="text-lg font-bold mb-4 text-emerald-400 flex items-center gap-2">
                    <i class="fa-solid fa-user-check"></i> الموافقة على مستخدم أونلاين
                </h3>
                <p class="text-xs text-slate-400 mb-4">أدخل بريد العميل لمنحه صلاحية فتح التطبيق من الموبايل فوراً:</p>
                
                <div class="space-y-3">
                    <input type="text" id="appIdToApprove" placeholder="معرّف التطبيق (App ID)" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-2 text-white text-sm" dir="ltr">
                    <input type="email" id="emailToApprove" placeholder="بريد العميل (user@email.com)" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-2 text-white text-sm" dir="ltr">
                    
                    <button onclick="approveUser()" class="w-full bg-emerald-600 hover:bg-emerald-500 font-bold py-2.5 rounded-xl transition text-sm flex items-center justify-center gap-2">
                        <i class="fa-solid fa-check"></i> منح الموافقة أونلاين
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function toggleAuthFields() {
            const type = document.getElementById('authType').value;
            const passField = document.getElementById('passwordField');
            if (type === 'password') {
                passField.classList.remove('hidden');
            } else {
                passField.classList.add('hidden');
            }
        }

        document.getElementById('createAppForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const status = document.getElementById('statusBox');
            status.classList.remove('hidden');
            status.className = "mt-4 p-3 rounded-xl text-center text-sm font-bold bg-indigo-500/10 text-indigo-300 border border-indigo-500/20";
            status.innerText = "جاري الحفظ على Vercel... ⏳";

            const formData = new FormData();
            formData.append('app_name', document.getElementById('appName').value);
            formData.append('target_url', document.getElementById('targetUrl').value);
            formData.append('auth_type', document.getElementById('authType').value);
            formData.append('access_password', document.getElementById('accessPassword').value);

            try {
                const res = await fetch('/api/apps/create', { method: 'POST', body: formData });
                const data = await res.json();
                
                if (data.success) {
                    status.className = "mt-4 p-3 rounded-xl text-center text-sm font-bold bg-emerald-500/10 text-emerald-400 border border-emerald-500/20";
                    status.innerHTML = `🎉 تم حفظ الإعدادات بنجاح!<br>معرّف التطبيق: <span class="font-mono text-white">${data.app_id}</span>`;
                }
            } catch (err) {
                status.className = "mt-4 p-3 rounded-xl text-center text-sm font-bold bg-rose-500/10 text-rose-400 border border-rose-500/20";
                status.innerText = "حدث خطأ في الاتصال بالسيرفر!";
            }
        });

        async function approveUser() {
            const appId = document.getElementById('appIdToApprove').value;
            const email = document.getElementById('emailToApprove').value;

            if(!appId || !email) return alert("يرجى ملء كافة الحقول");

            const formData = new FormData();
            formData.append('app_id', appId);
            formData.append('user_email', email);

            const res = await fetch('/api/admin/approve-user', { method: 'POST', body: formData });
            const data = await res.json();
            alert(data.message);
        }
    </script>
</body>
</html>
